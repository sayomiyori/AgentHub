services:
  app:
    build: .
    container_name: agenthub_app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8014:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/agenthub
      REDIS_URL: redis://redis:6379/0
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LLM_PROVIDER: gemini
      LLM_FALLBACK_PROVIDER: ${LLM_FALLBACK_PROVIDER:-}
      LLM_FALLBACK_MODEL: ${LLM_FALLBACK_MODEL:-}
      MCP_SERVERS: ${MCP_SERVERS:-}
      LLM_MODEL: models/gemini-2.0-flash
      EMBEDDING_MODEL: models/text-embedding-004
      SEMANTIC_CACHE_ENABLED: ${SEMANTIC_CACHE_ENABLED:-true}
    volumes:
      - ./:/app
    depends_on:
      - postgres
      - redis

  celery_worker:
    build: .
    container_name: agenthub_worker
    command: celery -A app.workers.embed_worker.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/agenthub
      REDIS_URL: redis://redis:6379/0
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      LLM_PROVIDER: gemini
      EMBEDDING_MODEL: models/text-embedding-004
    volumes:
      - ./:/app
    depends_on:
      - postgres
      - redis

  postgres:
    image: pgvector/pgvector:pg16
    container_name: agenthub_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agenthub
    ports:
      - "55432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./app/db/init:/docker-entrypoint-initdb.d

  redis:
    image: redis:7-alpine
    container_name: agenthub_redis
    ports:
      - "56379:6379"

  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: agenthub_prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "59090:9090"
    depends_on:
      - app

  grafana:
    image: grafana/grafana:10.4.2
    container_name: agenthub_grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3005:3000"
    depends_on:
      - prometheus

volumes:
  pgdata:
  grafana_data:
