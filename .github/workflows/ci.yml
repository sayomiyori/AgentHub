name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: agenthub
        ports:
          - 55432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:55432/agenthub
      REDIS_URL: redis://localhost:6379/0
      GEMINI_API_KEY: ""
      LLM_PROVIDER: gemini
      LLM_MODEL: models/gemini-2.0-flash
      EMBEDDING_MODEL: models/gemini-embedding-001

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy

      - name: Enable pgvector extension
        run: |
          pip install "psycopg[binary]"
          python << 'PY'
          import psycopg
          conn = psycopg.connect("postgresql://postgres:postgres@localhost:55432/agenthub")
          conn.execute("CREATE EXTENSION IF NOT EXISTS vector")
          conn.commit()
          conn.close()
          PY

      - name: Ruff
        run: python -m ruff check .

      - name: Mypy
        run: |
          python -m mypy app/models/llm_usage.py app/services/usage_tracker.py app/metrics.py app/cache/semantic_cache.py

      - name: Pytest
        run: pytest -q tests/

      - name: Docker build
        run: docker build -t agenthub:test .
